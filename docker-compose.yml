services:
  # qdrant 是向量数据库服务，负责保存 chunk 向量和 payload。
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # 把 Qdrant 数据持久化到 Docker volume，避免容器重启后数据丢失。
      - qdrant_storage:/qdrant/storage

  # api 是当前 FastAPI RAG 服务。
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    env_file:
      - .env
    environment:
      # 容器之间通过 service name 通信，所以这里不能写 127.0.0.1。
      QDRANT_URL: http://qdrant:6333
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
